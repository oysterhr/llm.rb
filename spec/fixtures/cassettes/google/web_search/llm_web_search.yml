                    "text": "Here's a summary of today's news, March 18, 2026:\n\n**Southeast Asia**\n\nAcross Southeast Asia, several countries are focusing on infrastructure and public services. Cambodia has launched an Electronic Immunisation Registry to enhance vaccination services and improve its health supply chain, alongside introducing a roadmap for National Quality Infrastructure to boost the competitiveness of locally made products. Indonesia's President Prabowo Subianto has called for the modernization of all railway stations nationwide starting this year, while the Ministry of Transportation assures that international flights continue despite Middle East tensions. Laos is exploring the development of an AI-powered green aluminum industrial park with Chinese investors and has reported significant losses and fatalities due to weather-related hazards over the past five years. In the Philippines, manufacturers of essential goods have pledged to maintain current prices for the next 30 to 60 days, though fuel surcharges for airlines are set to jump due to volatile oil prices. A Singaporean man was arrested for vice-related offenses after being deported from Thailand.\n\n**India**\n\nIn India, a top U.S. counterterrorism official has reportedly resigned in protest of an \"Iran war\". The Lok Sabha has revoked the suspension of eight Opposition members. A fire at SCB Medical College Hospital in Cuttack, Odisha, has resulted in 12 deaths, sparking political controversy. The Odisha Congress has suspended three MLAs for cross-voting in the Rajya Sabha elections, which saw a clean sweep for the BJP.\n\n**Global Economy and Other News**\n\nGlobally, gold prices have remained steady amidst ongoing geopolitical uncertainties and anticipation of the Federal Reserve's interest rate decision. US gold futures for April are hovering around USD 5,000.61 per ounce. Oil prices have seen a significant increase this week due to supply concerns linked to Middle East tensions, with no immediate relief expected.\n\nIn the United States, there's ongoing public opposition to a proposed cruise ship terminal development near the Terra Ceia Aquatic Preserve in Florida.\n\nIn other news, Ramadhan activities are in their final stretch in the Bangsamoro region, with young people engaging in acts of service. Nepal is expecting light rain or snowfall with thunder and lightning in the hilly and mountainous regions."
                  }
